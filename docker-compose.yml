version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: marketing_postgres
    environment:
      POSTGRES_USER: marketing_user
      POSTGRES_PASSWORD: marketing_pass
      POSTGRES_DB: marketing_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketing_user -d marketing_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: marketing_api
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://marketing_user:marketing_pass@postgres:5432/marketing_db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=gemini-2.5-flash
      - API_DEBUG=true
    depends_on:
      postgres:
        condition: service_healthy

  streamlit:
    build: .
    container_name: marketing_streamlit
    command: streamlit run dashboard/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://marketing_user:marketing_pass@postgres:5432/marketing_db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      - api

volumes:
  postgres_data:
