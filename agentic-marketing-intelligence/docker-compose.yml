version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: marketing_intelligence_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-marketing_intelligence}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketing_intelligence_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./mlops:/app/mlops
      - ./reports:/app/reports
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketing_intelligence_dashboard
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    command: ["streamlit", "run", "app.py", "--server.port=8501", "--server.address=0.0.0.0"]

volumes:
  postgres_data:
    driver: local
